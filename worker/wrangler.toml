# Cloudflare Worker config for the family-tree backend.
#
# Before deploying:
#   1. `npm install -g wrangler` (or use `npx wrangler`)
#   2. `wrangler login`
#   3. Fill in the [vars] below with your own values
#   4. `wrangler secret put GITHUB_TOKEN`     # paste a fine-grained PAT with contents:write
#   5. `wrangler secret put FAMILY_PASSWORD`  # paste the shared family password (e.g. "shum")
#   6. `wrangler deploy`

name = "family-tree-api"
main = "index.ts"
compatibility_date = "2025-01-01"

[vars]
GITHUB_REPO = "CHANGE-ME/family-tree"
MAIN_BRANCH = "main"
EDITS_BRANCH = "edits"
ALLOWED_ORIGIN = "https://CHANGE-ME.github.io"

# For local worker testing: `wrangler dev` uses .dev.vars for secrets.
